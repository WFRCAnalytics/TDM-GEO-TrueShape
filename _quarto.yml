project:
  type: website
  output-dir: docs
  render:
    - "*.qmd"       # Include all .qmd files by default
    - "!*.ipynb"    # Exclude jupyter notebooks

website:
  title: "True Shape Network"
  description: Converting the WFRC skeleton travel demand model network (WFv1000 MasterNet) into a true-shape geographic network by conflating abstract model links to high-fidelity UGRC/UDOT roadway centerlines.
  favicon: "https://raw.githubusercontent.com/WFRCAnalytics/wfrcanalytics.github.io/main/assets/logo/abbreviated/WFRC_logo_abbreviated_white_transparent.png"
  site-url: 'https://wfrcanalytics.github.io/TDM-NET-TrueShape'

  navbar:
    logo: "https://raw.githubusercontent.com/WFRCAnalytics/wfrcanalytics.github.io/main/assets/logo/abbreviated/WFRC_logo_abbreviated_white_transparent.png"
    logo-alt: 'WFRC site theme-based logo'

execute:
   eval: true
jupyter: python3

format:
  html:
    theme:
        light: flatly
        dark: darkly
    respect-user-color-scheme: true

    fig-width: 8.4
    fig-height: 5.44
    fig-responsive: true

    toc: true
    number-sections: true
    number-depth: 2
    html-math-method: katex
    code-link: true
    code-tools: true
    code-fold: true
    code-summary: "Show the code"
    # fig-width: 8
    # fig-height: 5
    # out-width: "100%"
    # fig-align: center


title-block-banner: true

# freeze computational output
# (see https://quarto.org/docs/projects/code-execution.html#freeze)
freeze: auto
